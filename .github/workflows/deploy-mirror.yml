name: Deploy Mirror (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，如 3.5.3）'
        required: true
        default: '3.5.3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --pattern "GeoDownloader_*" \
            --dir artifacts
          ls -la artifacts/

      - name: Create remote directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          script: |
            powershell -Command "New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\v${{ inputs.version }}' | Out-Null; New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\latest' | Out-Null; New-Item -ItemType Directory -Force -Path 'C:\Users\${{ secrets.MIRROR_USER }}\temp_upload' | Out-Null; Write-Host 'Ready.'"

      - name: SCP files to temp directory
        env:
          SSHPASS: ${{ secrets.MIRROR_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          for f in artifacts/*; do
            echo "Uploading $(basename $f)..."
            sshpass -e scp -o StrictHostKeyChecking=no \
              "$f" \
              "${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }}:temp_upload/$(basename $f)"
          done
          echo "All files uploaded."

      - name: Move files to final location
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          script: |
            powershell -Command "
              $src = 'C:\Users\${{ secrets.MIRROR_USER }}\temp_upload'
              $dest = 'C:\nginx-1.30.2\packages\v${{ inputs.version }}'
              $latest = 'C:\nginx-1.30.2\packages\latest'
              Get-ChildItem $src | ForEach-Object { Move-Item $_.FullName -Destination $dest -Force; Write-Host ('  Moved: ' + $_.Name) }
              Remove-Item (Join-Path $latest '*') -Force -ErrorAction SilentlyContinue
              Copy-Item (Join-Path $dest '*') -Destination $latest -Force
              Remove-Item $src -Force -Recurse -ErrorAction SilentlyContinue
              Write-Host 'Done. Latest:'; Get-ChildItem $latest | ForEach-Object { Write-Host ('  ' + $_.Name + ' (' + [math]::Round($_.Length / 1MB, 1) + ' MB)') }
            "
