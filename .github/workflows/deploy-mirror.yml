name: Deploy Mirror (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，如 3.5.3）'
        required: true
        default: '3.5.3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to mirror server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          script: |
            powershell -Command "
              $version = '${{ inputs.version }}'
              $repo = '${{ github.repository }}'
              $dir = \"C:\nginx-1.30.2\packages\v$version\"
              $latest = 'C:\nginx-1.30.2\packages\latest'

              New-Item -ItemType Directory -Force -Path $dir | Out-Null
              New-Item -ItemType Directory -Force -Path $latest | Out-Null

              $headers = @{ 'User-Agent' = 'GeoDownloader-Mirror' }
              $api = \"https://api.github.com/repos/$repo/releases/tags/v$version\"
              $release = Invoke-RestMethod -Uri $api -Headers $headers
              $assets = $release.assets | Where-Object { $_.name -match '\.(exe|msi|dmg|deb|AppImage|rpm)$' }

              foreach ($asset in $assets) {
                $outFile = Join-Path $dir $asset.name
                Write-Host \"Downloading $($asset.name)...\"
                Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $outFile -Headers $headers
                Write-Host \"  -> Done ($([math]::Round((Get-Item $outFile).Length / 1MB, 1)) MB)\"
              }

              Remove-Item \"$latest\*\" -Force -ErrorAction SilentlyContinue
              Copy-Item \"$dir\*\" -Destination $latest -Force
              Write-Host 'All done. Latest:'
              Get-ChildItem $latest | ForEach-Object { Write-Host \"  $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)\" }
            "
