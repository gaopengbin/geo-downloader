name: Deploy Mirror (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（不带 v 前缀，如 3.5.3）'
        required: true
        default: '3.5.3'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p artifacts
          gh release download "v${{ inputs.version }}" \
            --repo ${{ github.repository }} \
            --pattern "GeoDownloader_*" \
            --dir artifacts
          ls -la artifacts/

      - name: Create remote directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          script: |
            powershell -Command "
              New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\v${{ inputs.version }}' | Out-Null
              New-Item -ItemType Directory -Force -Path 'C:\nginx-1.30.2\packages\latest' | Out-Null
            "

      - name: Upload files via scp
        env:
          SSHPASS: ${{ secrets.MIRROR_PASSWORD }}
        run: |
          sudo apt-get install -y sshpass
          for f in artifacts/*; do
            echo "Uploading $(basename $f)..."
            sshpass -e scp -o StrictHostKeyChecking=no \
              "$f" \
              "${{ secrets.MIRROR_USER }}@${{ secrets.MIRROR_HOST }}:C:/nginx-1.30.2/packages/v${{ inputs.version }}/$(basename $f)"
          done

      - name: Copy to latest
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.MIRROR_HOST }}
          username: ${{ secrets.MIRROR_USER }}
          password: ${{ secrets.MIRROR_PASSWORD }}
          script: |
            powershell -Command "
              Remove-Item 'C:\nginx-1.30.2\packages\latest\*' -Force -ErrorAction SilentlyContinue
              Copy-Item 'C:\nginx-1.30.2\packages\v${{ inputs.version }}\*' -Destination 'C:\nginx-1.30.2\packages\latest\' -Force
              Write-Host 'Done. Files in latest:'
              Get-ChildItem 'C:\nginx-1.30.2\packages\latest' | ForEach-Object { Write-Host \"  $($_.Name) ($([math]::Round($_.Length / 1MB, 1)) MB)\" }
            "
